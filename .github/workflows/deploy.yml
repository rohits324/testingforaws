name: Deploy HTML to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code from GitHub
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Copy files to EC2 server
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "*"
          target: "/home/ubuntu/site"

      # Step 3: Deploy to your specific folder on EC2
      - name: Deploy to /var/www/html/testingforaws
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Remove old files in testingforaws folder
            sudo rm -rf /var/www/html/testingforaws/*

            # Copy new files from /home/ubuntu/site
            sudo cp -r /home/ubuntu/site/* /var/www/html/testingforaws/

            # Fix permissions so Apache can serve them
            sudo chmod -R 755 /var/www/html/testingforaws

            # Restart Apache to make sure changes take effect
            sudo systemctl restart apache2